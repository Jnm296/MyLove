<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>OurLittleWorld.space</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="clock-container">
    <div id="time">00:00</div>
    <div id="date">วันเดือนปี</div>
    
    <!-- ย้ายแผ่นเสียงมาไว้ตรงนี้ -->
    <div class="vinyl-wrapper" onclick="toggleMusic()">
        <img src="vinyl.png" class="vinyl">
    </div>
    
    <!-- เพิ่มส่วนแสดงสถานะเพลง -->
    <div id="music-status">
        <div id="track-name">ไม่ได้เล่นเพลง</div>
        <div id="track-time">00:00 / 00:00</div>
    </div>
</div>
<div id="player"></div>

    <div id="side-tab" onclick="togglePanel()">⚙️ ตั้งค่า</div>

    <div id="control-panel">
    <!-- ส่วนบน: หน้าปกและชื่อ -->
    <div id="now-playing-preview">
        <img id="track-thumbnail" src="https://via.placeholder.com/150" alt="Cover">
        <h3 id="display-title">เลือกเพลงเพื่อเริ่มฟัง</h3>
    </div>

    <h3>Music Settings</h3>
    <input type="text" id="musicInput" placeholder="วางลิงก์ YouTube ที่นี่...">
    <button onclick="saveAndPlay()">เพิ่มเข้าคลังเพลง</button>

    <!-- ส่วนรายการเพลง -->
    <div id="playlist-container">
        <h4>รายการเพลงของคุณ:</h4>
        <ul id="song-list">
            <!-- รายการเพลงจะมาแสดงตรงนี้ -->
        </ul>
    </div>
</div>

    <div id="overlay" onclick="togglePanel()"></div>

    <div id="cute-popup" class="hidden">
    <p id="popup-text">บันทึกเพลงให้แล้วน้า!</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    // ==========================================
    // 1. ตั้งค่าพื้นฐาน
    // ==========================================

    const app = initializeApp({
        apiKey: "AIzaSyB_GiqCqjMzdKbNORPO5uM-Ooweek-2q2c",
        authDomain: "loveu-9cf29.firebaseapp.com",
        projectId: "loveu-9cf29",
        storageBucket: "loveu-9cf29.firebasestorage.app",
        messagingSenderId: "497414477520",
        appId: "1:497414477520:web:6ceede202a07fa2186f0d5"
    });
    const db = getFirestore(app);
    
    let player;
    let playlist = []; 
    let currentIndex = 0;

    // วางฟังก์ชันนี้ไว้ในระดับเดียวกับ window.saveAndPlay
window.showPopup = (message) => {
    const popup = document.getElementById("cute-popup");
    const text = document.getElementById("popup-text");
    text.innerText = message;
    
    popup.classList.remove("hidden");
    setTimeout(() => {
        popup.classList.add("hidden");
    }, 3000);
};

// ตรวจสอบให้แน่ใจว่า window.saveAndPlay อยู่ในระดับเดียวกันแบบนี้
window.saveAndPlay = async () => {
    // ... โค้ดบันทึกของคุณ ...
    showPopup("บันทึกสำเร็จแล้ว!"); // ทีนี้มันจะรู้จักแล้วครับ
};

    // ==========================================
    // 2. ระบบดึงเพลงและ YouTube Player
    // ==========================================

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = async () => {
    // ดึงรายการเพลงจาก Firebase
    const docSnap = await getDoc(doc(db, "my-playlist", "list"));
    if (docSnap.exists() && docSnap.data().songs) {
        playlist = docSnap.data().songs;
        loadPlaylistUI(); // <--- เพิ่มบรรทัดนี้ เพื่อให้รายการเพลงแสดงออกมา
    } else {
        playlist = ["dQw4w9WgXcQ"]; 
    }

    // สร้าง Player
    player = new YT.Player('player', {
        height: '0',
        width: '0', 
        videoId: extractVideoId(playlist[0]),
        events: { 
            'onReady': (event) => {
                document.getElementById("track-name").innerText = "พร้อมเล่น";
                // ตั้งค่าหน้าปกเริ่มต้น
                document.getElementById("track-thumbnail").src = `https://img.youtube.com/vi/${extractVideoId(playlist[0])}/0.jpg`;
            },
            'onStateChange': onPlayerStateChange
        }
    });
};

    // เมื่อ YouTube โหลดเสร็จและพร้อมเล่น
    function onPlayerReady(event) {
        document.getElementById("track-name").innerText = "พร้อมเล่น (คลิกที่แผ่นเสียง)";
    }

    // เมื่อเพลงเล่นจบ
    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            playNextSong();
        }
    }

    // เล่นเพลงถัดไป
    function playNextSong() {
        currentIndex = (currentIndex + 1) % playlist.length;
        player.loadVideoById(extractVideoId(playlist[currentIndex]));
        player.playVideo();
        document.getElementById("currentSong").innerText = "เพลงที่ " + (currentIndex + 1);
        document.getElementById("track-name").innerText = "กำลังเล่น...";
    }

    function extractVideoId(url) {
        if(!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    async function getYouTubeTitle(url) {
    try {
        const oembedUrl = `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`;
        const response = await fetch(oembedUrl);
        const data = await response.json();
        return data.title;
    } catch (error) {
        console.error("ดึงชื่อไม่ได้:", error);
        return null; // ให้ส่งกลับเป็น null เพื่อที่ฟังก์ชัน save จะได้รู้ว่าไม่มีชื่อ
    }
}



    // ==========================================
    // 3. ปุ่มกดและการทำงานหน้าเว็บ
    // ==========================================
    // ปรับปรุงฟังก์ชัน togglePanel เพื่อให้จัดการทั้งตัว Panel และ Overlay
window.togglePanel = () => {
    const panel = document.getElementById("control-panel");
    const overlay = document.getElementById("overlay");
    
    panel.classList.toggle("active");
    
    // ถ้า Panel เปิดอยู่ ให้แสดง Overlay เพื่อดักการคลิกข้างนอก
    if (panel.classList.contains("active")) {
        overlay.style.display = "block";
    } else {
        overlay.style.display = "none";
    }
};

    // ==========================================
    // 4. อัปเดตเวลาและสถานะเพลง
    // ==========================================
    function updateClock() {
        const now = new Date();
        document.getElementById('time').innerText = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').innerText = now.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function updateTrackTime() {
        if (player && player.getCurrentTime) {
            const cur = Math.floor(player.getCurrentTime());
            const dur = Math.floor(player.getDuration() || 0);
            if (dur > 0) { // แสดงเวลาเมื่อเพลงโหลดมาแล้ว
                const format = (s) => new Date(s * 1000).toISOString().substr(14, 5);
                document.getElementById('track-time').innerText = `${format(cur)} / ${format(dur)}`;
            }
        }
    }

    setInterval(() => {
        updateClock();
        updateTrackTime();
    }, 1000);
    updateClock();

// ==========================================
// ส่วนของการเพิ่มเพลง (วางต่อกันใน script นะคะ)
// ==========================================

window.saveAndPlay = async () => {
    const input = document.getElementById("musicInput");
    const newUrl = input.value;
    
    if (!newUrl) return alert("ใส่ลิงก์ก่อนน้า");
    
    // เช็คว่าซ้ำไหม
    if (playlist.includes(newUrl)) {
        alert("เพลงนี้มีในคลังแล้วค่ะที่รัก!");
        return;
    }

    try {
        // 1. บันทึกลง Firebase
        await updateDoc(doc(db, "my-playlist", "list"), {
            songs: arrayUnion(newUrl)
        });
        
        // 2. อัปเดต Array ในเครื่อง
        playlist.push(newUrl); 
        
        // 3. วาดรายการใหม่
        loadPlaylistUI(); 
        
        // 4. ล้างช่อง input และแสดง Pop-up
        input.value = "";
        showPopup("เพิ่มเพลงให้แล้วน้า! 🎵");
        
    } catch (error) {
        console.error("Error: ", error);
        alert("บันทึกไม่สำเร็จ ลองใหม่อีกทีนะ");
    }
};

// ฟังก์ชันดึงเพลงมาแสดง (ต้องอยู่นอก saveAndPlay)
function loadPlaylistUI() {
    const songList = document.getElementById("song-list");
    songList.innerHTML = ""; 

    playlist.forEach((url, index) => {
        const li = document.createElement("li");
        li.innerText = "กำลังโหลด..."; 
        
        // ดึงชื่อเพลง
        fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`)
            .then(res => res.json())
            .then(data => { li.innerText = data.title; })
            .catch(() => { li.innerText = "เพลงที่ " + (index + 1); });

        li.onclick = () => playSpecificSong(index);
        songList.appendChild(li);
    });
}

window.playSpecificSong = async (index) => {
    currentIndex = index;
    const url = playlist[currentIndex];
    
    // 1. เปลี่ยนชื่อบนจอทันที
    const displayTitle = document.getElementById("display-title");
    displayTitle.innerText = "กำลังโหลดชื่อเพลง...";

    // 2. ดึงชื่อเพลงจาก YouTube
    try {
        const res = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
        const data = await res.json();
        displayTitle.innerText = data.title;
        
        // 3. อัปเดตหน้าปกให้ตรงกับเพลงนั้น
        const videoId = extractVideoId(url);
        document.getElementById("track-thumbnail").src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
    } catch (e) {
        displayTitle.innerText = "เพลงที่ " + (index + 1);
    }

    // 4. สั่งให้ Player เล่นเพลง
    player.loadVideoById(extractVideoId(url));
    player.playVideo();

    
};</script>
